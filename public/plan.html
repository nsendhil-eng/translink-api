<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan a Journey - Brisbane Transit</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; font-family: 'Inter', sans-serif; }

        /* Mode chips & sort buttons */
        .plan-mode-chip {
            display: inline-block; padding: 1px 8px; border-radius: 5px;
            font-size: 11px; font-weight: 700; color: white; white-space: nowrap;
        }
        .plan-sort-btn {
            padding: 5px 14px; border-radius: 9999px; font-size: 13px; font-weight: 600;
            border: 1.5px solid #d1d5db; cursor: pointer; transition: all .15s;
        }
        .plan-sort-active  { background: #2563eb; color: white; border-color: #2563eb; }
        .plan-sort-inactive { background: white; color: #374151; }
        .dark .plan-sort-inactive { background: #1f2937; color: #d1d5db; border-color: #4b5563; }

        /* Card selected ring */
        .plan-card-selected { box-shadow: 0 0 0 2px #2563eb; }

        /* Stop label markers */
        .plan-stop-marker { display: flex; flex-direction: column; align-items: center; }
        .plan-stop-label {
            background: rgba(15,15,15,0.88); color: white; font-size: 10px; font-weight: 700;
            padding: 2px 8px; border-radius: 9999px; white-space: nowrap;
            max-width: 130px; overflow: hidden; text-overflow: ellipsis; line-height: 1.6;
        }
        .plan-stop-stem  { width: 2px; height: 6px; background: rgba(40,40,40,0.6); }
        .plan-stop-dot   { width: 10px; height: 10px; border-radius: 50%; border: 2px solid white; }

        /* Results panel scroll */
        #results-panel { overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-200 flex flex-col">

    <!-- Header -->
    <div class="w-full max-w-7xl mx-auto px-4 pt-4 pb-2 flex-shrink-0">
        <header class="flex items-center gap-3 mb-4">
            <a href="index.html" title="Back" class="flex-shrink-0 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 p-2 rounded-full transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            </a>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Plan a Journey</h1>
        </header>

        <!-- From / To inputs -->
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-md p-4">
            <div class="flex items-center gap-3">
                <!-- Timeline dots -->
                <div class="flex flex-col items-center self-stretch justify-center py-1">
                    <div class="w-3 h-3 rounded-full bg-blue-500 flex-shrink-0"></div>
                    <div class="w-0.5 flex-1 bg-gray-300 dark:bg-gray-600 my-1 min-h-[20px]"></div>
                    <div class="w-3 h-3 rounded-full border-2 border-blue-500 bg-white dark:bg-gray-800 flex-shrink-0"></div>
                </div>

                <!-- Inputs -->
                <div class="flex-1 flex flex-col gap-1.5 min-w-0">
                    <div class="relative">
                        <input id="plan-from-input" type="text" placeholder="From: address or place…"
                            autocomplete="off"
                            class="w-full px-3 py-2.5 text-sm rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 text-gray-900 dark:text-white placeholder-gray-400">
                        <div id="plan-from-suggestions"
                            class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-2xl z-[3000] max-h-64 overflow-y-auto"></div>
                    </div>
                    <div class="relative">
                        <input id="plan-to-input" type="text" placeholder="To: address or place…"
                            autocomplete="off"
                            class="w-full px-3 py-2.5 text-sm rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-400 text-gray-900 dark:text-white placeholder-gray-400">
                        <div id="plan-to-suggestions"
                            class="hidden absolute left-0 right-0 top-full mt-1 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl shadow-2xl z-[3000] max-h-64 overflow-y-auto"></div>
                    </div>
                </div>

                <!-- Action buttons -->
                <div class="flex flex-col gap-1.5 flex-shrink-0">
                    <button id="plan-use-location" title="Use my location"
                        class="p-2 rounded-lg bg-blue-50 dark:bg-gray-700 hover:bg-blue-100 dark:hover:bg-gray-600 text-blue-600 dark:text-blue-400 transition">
                        <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd"/>
                        </svg>
                    </button>
                    <button id="plan-swap-btn" title="Swap from / to"
                        class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-600 dark:text-gray-300 transition">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Map + Results -->
    <div class="flex-1 w-full max-w-7xl mx-auto px-4 pb-4 min-h-0 flex flex-col md:flex-row gap-4 mt-4">

        <!-- Map -->
        <div class="relative rounded-xl shadow-lg overflow-hidden h-[35vh] md:h-auto md:flex-1">
            <div id="plan-map" class="w-full h-full"></div>
            <div id="map-hint" class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <p class="bg-black/50 text-white text-sm px-4 py-2 rounded-full">Enter a journey to see the route</p>
            </div>
        </div>

        <!-- Results panel -->
        <div id="results-panel" class="md:w-[380px] lg:w-[420px] flex-shrink-0">
            <div id="results-content" class="space-y-3">
                <!-- populated by JS -->
            </div>
        </div>
    </div>

    <script src="plan.js" defer></script>
</body>
</html>
